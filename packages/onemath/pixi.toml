# naga-onemath Workspace
# SYCL math library with NVIDIA CUDA backend support
#
# ============================================================================
# WORKFLOW
# ============================================================================
#
# First time setup (creates recipe symlinks):
#   pixi run repos-init
#
# Setup recipe symlinks:
#   pixi run setup
#
# Build and install:
#   pixi install
#
# This builds three packages from one recipe:
#   - naga-onemath-libs:  Runtime libraries only
#   - naga-onemath-devel: Development files (headers, cmake modules)
#   - naga-onemath:       Full package (meta-package)
#
# ============================================================================
# BUILD STRATEGY
# ============================================================================
#
# The build runs directly in the repo/ directory (not a copy) to enable
# incremental builds. Subsequent builds only recompile changed files.
#
# IMPORTANT: The AdaptiveCPP package must be built and installed first.
# The local channel is included to provide pre-built packages during build.

[workspace]
channels = [
  "https://prefix.dev/pixi-build-backends",
  "conda-forge",
  "https://prefix.dev/code-accelerate",
]
platforms = ["linux-64"]
preview = ["pixi-build"]

[package.build]
backend = { name = "pixi-build-rattler-build", version = "*", channels = [
  "https://prefix.dev/code-accelerate",
  "https://prefix.dev/pixi-build-backends",
  "https://prefix.dev/conda-forge",
] }

[package.build.config]
experimental = false

[system-requirements]
libc = "2.34"

[target.linux-64.dependencies]
sysroot_linux-64 = ">=2.34"

[tasks]
repos-init = { cmd = "nu scripts/init-repos.nu", description = "Clone oneMath repository from .repos.toml" }
setup = { cmd = "ln -sfn ../recipe libs/recipe && ln -sfn ../recipe devel/recipe && ln -sfn ../recipe onemath/recipe && echo Recipe symlinks created successfully", description = "Create recipe symlinks for multi-output build" }

