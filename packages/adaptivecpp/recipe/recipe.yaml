schema_version: 1

context:
  name: naga-adaptivecpp-toolkit
  version: "25.10.0"

recipe:
  name: ${{ name }}
  version: ${{ version }}

# NOTE: Channels must be specified at build-time via CLI flags:
#   rattler-build build -c conda-forge
# This is required to resolve compiler('c') and compiler('cxx') dependencies.

source:
  # Use a minimal dummy directory to avoid copying files
  # The build script uses RECIPE_DIR/../repo as the actual source
  path: ../src

build:
  skip:
    - win
    - osx

outputs:
  # Output 1: Runtime libraries
  - package:
      name: ${{ name }}-libs
      version: ${{ version }}

    build:
      script: scripts/build.sh
      files:
        - lib/**/*.so*
        - etc/AdaptiveCpp/*
        - lib/hipSYCL/*
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cuda >=12,<13
        - cmake >=3.24
        - ninja >=1.12
        - python >=3.10
        - git
        - ccache
      host:
        - zlib
        - libxml2-devel
        - libedit
        - boost-cpp >=1.84
      run:
        - ${{ stdlib('c') }}
        - libstdcxx ${{ cxx_compiler_version }}
        - libzlib
        - libxml2
        - libedit
      run_constraints:
        - cuda >=12,<13
        - __cuda >=12
      run_exports:
        - ${{ pin_subpackage(name ~ '-libs', upper_bound='x.x') }}

    tests:
      - script:
          - test -f $PREFIX/lib/libacpp_runtime.so
          - test -f $PREFIX/lib/hipSYCL/ext/bitcode/ptx/libdevice.10.bc

  # Output 2: Development headers
  - package:
      name: ${{ name }}-devel
      version: ${{ version }}

    build:
      script: scripts/build.sh
      files:
        - lib/**/*.so*
        - etc/AdaptiveCpp/*
        - lib/hipSYCL/*
        - lib/cmake/*
        - include/*

    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cuda >=12,<13
        - cmake >=3.24
        - ninja >=1.12
        - python >=3.10
        - git
        - ccache
      host:
        - zlib
        - libxml2-devel
        - libedit
        - boost-cpp >=1.84
      run:
        - ${{ stdlib('c') }}
        - libstdcxx ${{ cxx_compiler_version }}
        - libstdcxx-devel_linux-64 ${{ cxx_compiler_version }}
        - libzlib
        - libxml2
        - libedit
      run_constraints:
        - cuda >=12,<13
        - __cuda >=12
      run_exports:
        - ${{ pin_subpackage(name ~ '-libs', upper_bound='x.x') }}

    tests:
      - script:
          - test -f $PREFIX/include/sycl/sycl.hpp
          - test -d $PREFIX/lib/cmake/AdaptiveCpp

  # Output 3: Full toolkit
  - package:
      name: ${{ name }}
      version: ${{ version }}

    build:
      script: scripts/build.sh
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cuda >=12,<13
        - cmake >=3.24
        - ninja >=1.12
        - python >=3.10
        - git
        - ccache
      host:
        - zlib
        - libxml2-devel
        - libedit
        - boost-cpp >=1.84
      run:
        - ${{ stdlib('c') }}
        - libstdcxx ${{ cxx_compiler_version }}
        - python >=3.10
        - gcc ${{ c_compiler_version }}
        - gxx ${{ cxx_compiler_version }}
        - libzlib
        - libxml2
        - libedit
      run_constraints:
        - cuda >=12,<13
        - __cuda >=12
      run_exports:
        - ${{ pin_subpackage(name ~ '-libs', upper_bound='x.x') }}

    tests:
      - script:
          - acpp --version
          - acpp-info --list-targets
          - clang++ --version
          - test -f $PREFIX/lib/hipSYCL/ext/bitcode/ptx/libdevice.10.bc
