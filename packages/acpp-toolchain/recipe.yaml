# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
#
# recipe.yaml — AdaptiveCpp toolchain (LLVM 20 + AdaptiveCpp, linked-into-LLVM mode)
# Build with: rattler-build build --experimental --recipe recipe.yaml
#

context:
  llvm_version: "20.1.8"
  llvm_major: "20"
  acpp_version: "25.10.0"
  pkg_version: "20.1_acpp25.10.0"

recipe:
  name: acpp-toolchain-split
  version: ${{ pkg_version }}

# The cache section builds LLVM+AdaptiveCpp once. Both outputs
# carve up the resulting install tree via files.include globs.
# Requires: rattler-build build --experimental
cache:
  source:
    - url: https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ llvm_version }}/llvm-project-${{ llvm_version }}.src.tar.xz
      target_directory: llvm-project
    - url: https://github.com/AdaptiveCpp/AdaptiveCpp/archive/refs/tags/v${{ acpp_version }}.tar.gz
      target_directory: AdaptiveCpp

  build:
    script:
      - if: linux
        then: bash ${RECIPE_DIR}/build.sh

  requirements:
    build:
      # gxx_linux-64: conda-forge GCC toolchain, sysroot-aware, builds our LLVM
      - ${{ compiler('c') }}
      - ${{ compiler('cxx') }}
      - ${{ stdlib('c') }}
      - cmake >=3.24
      - ninja
      - python >=3.8
      - patchelf
      - ccache
    host:
      - zlib # libz.so + headers at build time
      - zstd # libzstd.so + headers at build time
      - libxml2-devel # headers ONLY (split package). Like clangdev, we
        # use ignore_run_exports_from to suppress the
        # automatic run dep injection — libxml2 is used
        # for static diagnostics code, not dlopen'd at runtime.
      - boost-cpp # Boost headers needed by AdaptiveCpp (header-only)
      - level-zero-devel # Level Zero headers for AdaptiveCpp SSCP backend
      - ocl-icd # OpenCL ICD loader (needed at AdaptiveCpp build time)
      - opencl-headers # OpenCL headers for AdaptiveCpp SSCP backend
      - if: linux
        then:
          - cuda-cudart-dev >=12.0,<13
          - cuda-nvcc >=12.0,<13
          - cuda-driver-dev >=12.0,<13

outputs:
  # ── Output 1: shared libraries only ──────────────────────────────────────
  - package:
      name: acpp-libs
      version: ${{ pkg_version }}
    build:
      script:
        - if: linux
          then: bash ${RECIPE_DIR}/build.sh
      number: 0
      files:
        include:
          - lib/libLLVM*.so*
          - lib/libclang*.so*
          - lib/liblld*.so*
          - lib/libomp.so*
          - lib/libomptarget*.so*
          - lib/libacpp*.so*
          - lib/librt-backend-*.so*
          - lib/libllvm-to-backend.so*
          - lib/clang/${{ llvm_major }}/lib/**
          - lib/clang/${{ llvm_major }}/share/**
    requirements:
      build:
        - cmake >=3.24
        - ninja
        - python >=3.8
        - patchelf
        - ccache
      run:
        # level-zero and ocl-icd ARE dlopen'd at runtime by AdaptiveCpp's
        # SSCP backend — but they are driver-provided libraries that may
        # not be available in all conda environments. We list them here so
        # conda's solver installs the ICD loaders, but AdaptiveCpp handles
        # missing drivers gracefully at runtime.
        - level-zero # dlopen'd at runtime by the Level Zero SSCP backend
        - ocl-icd # dlopen'd at runtime by the OpenCL SSCP backend
        # libstdcxx-ng / libgcc-ng omitted: baked in by gxx_linux-64 build.
      # Downstream packages that have acpp-libs in host: automatically
      # get a run: dependency pinned to the same major.minor version.
      # Suppress automatic run dep injection from host libs.
      # Like clangdev, zlib/zstd/libxml2 are used during compilation of LLVM
      # itself (or statically inlined) but are NOT linked as dynamic dependencies
      # of our shipped .so files. Verify with:
      #   readelf -d $PREFIX/lib/libLLVM.so.20 | grep NEEDED
      # You should see libstdc++, libm, libc, libgcc_s — but NOT libz/libzstd/libxml2.
      ignore_run_exports:
        by_name:
          - zlib
          - zstd
          - libxml2-devel
          - level-zero-devel
          - ocl-icd
          - opencl-headers
          - cuda-cudart-dev # [linux]
          - cuda-driver-dev # [linux]
      run_exports:
        - ${{ pin_subpackage('acpp-libs', upper_bound='x.x') }}
      # Block all conda-forge clang/LLVM toolchain packages.
      # Our package bundles its own LLVM/Clang .so files — a second set of
      # libLLVM*.so / libclang-cpp*.so in $PREFIX/lib would cause the dynamic
      # linker to load the wrong library depending on link order. Users who
      # need an official clang/LLVM toolchain should use a separate environment.
      run_constraints:
        # ── Version-agnostic metapackages (user-facing install targets) ──
        # Blocking these is sufficient to prevent installation of any versioned
        # clang/LLVM package, since clang-N depends on these metapackages.
        - clang ==9999999999
        - clangxx ==9999999999
        - clangdev ==9999999999
        - llvmdev ==9999999999
        - clang-tools ==9999999999
        - clang-format ==9999999999
        # ── Our LLVM version explicitly (direct conflict) ──
        # clang-20 / llvm-20 match our bundled LLVM version exactly.
        # Other versioned packages (clang-19, clang-21, etc.) are blocked
        # transitively since they depend on libclang-cpp19/21 which are blocked below.
        - clang-20 ==9999999999
        - llvm-20 ==9999999999
        # ── Shared library packages (conflict with our bundled .so files) ──
        # These are the real blocking mechanism for all versioned clang-N packages:
        # clang-21 → libclang-cpp21 (blocked), clang-19 → libclang-cpp19 (blocked), etc.
        - libclang-cpp21 ==9999999999
        - libclang-cpp20 ==9999999999
        - libclang-cpp19 ==9999999999
        - libllvm21 ==9999999999
        - libllvm20 ==9999999999
        - libllvm19 ==9999999999
        - libclang13 ==9999999999
        - libclang ==9999999999
        # ── Activation packages (stomp on CC/CXX/CFLAGS env vars) ──
        - clang_linux-64 ==9999999999
        - clangxx_linux-64 ==9999999999
        - clang_impl_linux-64 ==9999999999
        - clangxx_impl_linux-64 ==9999999999
        # ── CUDA version (must match major version built against) ──
        # acpp embeds CUDA 12 .so names at build time (e.g. libcudart.so.12).
        # Installing a different major at runtime causes symbol lookup failures.
        # We do NOT force CUDA as a run dep — users who don't use CUDA don't
        # need it. But if they do install it, the major must match.
        - cuda-cudart >=12.0,<13 # conda CUDA runtime
        - cuda-nvrtc >=12.0,<13 # conda CUDA runtime compilation
        - cuda >=12.0,<13 # conda CUDA meta-package
        - __cuda >=12.0,<13 # virtual pkg: system CUDA driver version
    tests:
      - script:
          - test -f $PREFIX/lib/libLLVM.so.${{ llvm_major }}
          - test -f $PREFIX/lib/libomp.so
          - python3 -c "import ctypes, os; ctypes.CDLL(os.path.join(os.environ['PREFIX'], 'lib', 'libLLVM.so.${{ llvm_major }}'))"
      - package_contents:
          lib:
            - libLLVM

  # ── Output 2: compiler binaries + headers + CMake configs ─────────────
  # No activation scripts — those live in acpp-toolchain_linux-64
  - package:
      name: acpp-toolchain
      version: ${{ pkg_version }}
    build:
      script:
        - if: linux
          then: bash ${RECIPE_DIR}/build.sh
      number: 0
      files:
        include:
          - bin/**
          - include/**
          - lib/cmake/**
          - lib/clang/${{ llvm_major }}/include/**
          - lib/*.a
          - share/acpp/**
          - share/AdaptiveCpp/**
    requirements:
      build:
        - cmake >=3.24
        - ninja
        - python >=3.8
        - patchelf
        - ccache
      run:
        - ${{ pin_subpackage('acpp-libs', exact=True) }}
        - python >=3.8
      # Same pattern as clangdev: suppress run dep injection from
      # build-time-only host packages.
      ignore_run_exports:
        by_name:
          - zlib
          - zstd
          - libxml2-devel
          - level-zero-devel
          - ocl-icd
          - opencl-headers
          - cuda-cudart-dev # [linux]
          - cuda-driver-dev # [linux]
          # Note: no etc/conda/** here — activation belongs in _linux-64
      # Strong run_exports: packages compiled WITH this toolchain
      # automatically depend on acpp-libs at runtime.
      run_exports:
        strong:
          - ${{ pin_subpackage('acpp-libs', upper_bound='x.x') }}
      # Block all conda-forge clang/LLVM toolchain packages.
      # Our package installs clang++, lld, and related binaries into $PREFIX/bin.
      # A second conda-forge clang installation would shadow these in PATH,
      # silently breaking SYCL compilation.
      run_constraints:
        # ── Version-agnostic metapackages (user-facing install targets) ──
        - clang ==9999999999
        - clangxx ==9999999999
        - clangdev ==9999999999
        - llvmdev ==9999999999
        - clang-tools ==9999999999
        - clang-format ==9999999999
        # ── Our LLVM version explicitly (direct conflict) ──
        - clang-20 ==9999999999
        - llvm-20 ==9999999999
        # ── Shared library packages (conflict with our bundled .so files) ──
        - libclang-cpp21 ==9999999999
        - libclang-cpp20 ==9999999999
        - libclang-cpp19 ==9999999999
        - libllvm21 ==9999999999
        - libllvm20 ==9999999999
        - libllvm19 ==9999999999
        - libclang13 ==9999999999
        - libclang ==9999999999
        # ── Activation packages (stomp on CC/CXX/CFLAGS env vars) ──
        - clang_linux-64 ==9999999999
        - clangxx_linux-64 ==9999999999
        - clang_impl_linux-64 ==9999999999
        - clangxx_impl_linux-64 ==9999999999
        # ── CUDA version (must match major version built against) ──
        - cuda-cudart >=12.0,<13
        - cuda-nvrtc >=12.0,<13
        - cuda >=12.0,<13
        - __cuda >=12.0,<13
    tests:
      - script:
          - acpp --acpp-version
          - clang++ --version | grep "clang version ${{ llvm_major }}"
          - lld --version
          - |
            cat > /tmp/test_sycl.cpp << 'EOF'
            #include <sycl/sycl.hpp>
            int main() {
              sycl::queue q{sycl::default_selector_v};
              return 0;
            }
            EOF
            acpp --acpp-targets="generic" /tmp/test_sycl.cpp -o /tmp/test_sycl
            echo "Compile OK"
      - package_contents:
          bin:
            - clang++
            - acpp
            - lld
          include:
            - sycl/sycl.hpp

about:
  homepage: https://github.com/AdaptiveCpp/AdaptiveCpp
  license: Apache-2.0 WITH LLVM-exception
  license_file:
    - llvm-project/LICENSE.TXT
    - AdaptiveCpp/LICENSE
  summary: AdaptiveCpp SYCL compiler toolchain (LLVM ${{ llvm_major }} + acpp, linked-into-LLVM build)
  description: |
    Self-contained SYCL compiler supporting CUDA, OpenMP CPU, and Intel GPU
    (Level Zero / OpenCL) via the generic SSCP JIT compilation flow.
    Built from LLVM source with AdaptiveCpp linked directly into clang.
    Install acpp-toolchain_linux-64 alongside this package for
    sysroot-aware activation suitable for building redistributable packages.
  repository: https://github.com/AdaptiveCpp/AdaptiveCpp
