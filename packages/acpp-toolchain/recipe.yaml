# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
#
# recipe.yaml — AdaptiveCpp toolchain (LLVM 20 + AdaptiveCpp, linked-into-LLVM mode)
# Build with: rattler-build build --experimental --recipe recipe.yaml
#

context:
  llvm_version: "20.1.8"
  llvm_major: "20"
  llvm_minor: "1"
  acpp_version: "25.10.0"
  pkg_version: "20.1.8_acpp25.10.0"

recipe:
  name: acpp-toolchain-split
  version: ${{ pkg_version }}

# The cache section builds LLVM+AdaptiveCpp once. Both outputs
# carve up the resulting install tree via files.include globs.
# Requires: rattler-build build --experimental
cache:
  source:
    - url: https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ llvm_version }}/llvm-project-${{ llvm_version }}.src.tar.xz
      target_directory: llvm-project
    - url: https://github.com/AdaptiveCpp/AdaptiveCpp/archive/refs/tags/v${{ acpp_version }}.tar.gz
      target_directory: AdaptiveCpp

  build:
    script: build.sh

  requirements:
    build:
      # gxx_linux-64: conda-forge GCC toolchain, sysroot-aware, builds our LLVM
      - ${{ compiler('c') }}
      - ${{ compiler('cxx') }}
      - ${{ stdlib('c') }}
      - ${{ stdlib('cxx') }}
      - cmake >=3.24
      - ninja
      - python >=3.8
      - patchelf
      - ccache
    host:
      - zlib # libz.so + headers at build time
      - zstd # libzstd.so + headers at build time
      - libxml2 # headers ONLY (split package). Like clangdev, we
        # use ignore_run_exports_from to suppress the
        # automatic run dep injection — libxml2 is used
        # for static diagnostics code, not dlopen'd at runtime.
      - libboost-devel # Boost headers needed by AdaptiveCpp (header-only)
      - level-zero-devel # Level Zero headers for AdaptiveCpp SSCP backend
      - opencl-headers # OpenCL headers for AdaptiveCpp SSCP backend
      - numactl
      - if: linux
        then:
          - cuda >=12,<13
          - hipcc >=6,<7
          - rocm-device-libs >=6,<7
          # Ensures hip/rocm doesnt pull in conflicting clang/llvm 20 packages during build
          - clang >=19,<20
          - clangxx >=19,<20

outputs:
  # ── Output 1: shared libraries only ──────────────────────────────────────
  - package:
      name: acpp-libs
      version: ${{ pkg_version }}
    build:
      script: build.sh
      number: 0
      files:
        include:
          # All shared libraries (LLVM, Clang, acpp-rt, acpp-common, OMP)
          - lib/*.so*
          - lib/x86_64-conda-linux-gnu/*.so*
          # acpp runtime plugin backends (dlopen'd at runtime)
          - lib/hipSYCL/**
          # acpp runtime config (JSON manifests read at runtime)
          - etc/AdaptiveCpp/**
          # OMP debugger extension (runtime, used when debugging OMP kernels)
          - share/gdb/**
          # Activation script that symlinks device bitcode files if they exist
          - etc/conda/activate.d/acpp-libs-activate.sh
    requirements:
      run:
        - numactl
        - libstdcxx >=13
      ignore_run_exports:
        by_name:
          - level-zero-devel
      run_exports:
        - ${{ pin_subpackage('acpp-libs', upper_bound='x.x') }}
      # Block all conda-forge clang/LLVM toolchain packages.
      # Our package bundles its own LLVM/Clang .so files — a second set of
      # libLLVM*.so / libclang-cpp*.so in $PREFIX/lib would cause the dynamic
      # linker to load the wrong library depending on link order. Users who
      # need an official clang/LLVM toolchain should use a separate environment.
      run_constraints:
        # Activation packages — stomp CC/CXX/CFLAGS
        - clang_linux-64 ==9999999999
        - clangxx_linux-64 ==9999999999
        - clang_impl_linux-64 ==9999999999
        - clangxx_impl_linux-64 ==9999999999
        # Dev metapackages — install unversioned symlinks + headers that conflict
        - llvmdev ==9999999999
        - clangdev ==9999999999
        # Versioned libs that would conflict with our bundled .so files
        - libllvm20 ==9999999999
        - libclang20 ==9999999999
        - libclang-cpp20 ==9999999999
        # CUDA/ROCm version guards
        - cuda-cudart >=12.0,<13
        - cuda-nvrtc >=12.0,<13
        - cuda-nvvm >=12.0,<13
        - cuda >=12.0,<13
        - __cuda >=12.0,<13
        - hip-runtime-amd >=6,<7
        - rocm-device-libs >=6,<7
    tests:
      - package_contents:
          lib:
            - LLVM # matches libLLVM.so.20.1
            - clang # matches libclang.so.20.1.8
            - clang-cpp # matches libclang-cpp.so.20.1
            - acpp-rt # matches libacpp-rt.so
            - acpp-common # matches libacpp-common.so
          files:
            - lib/hipSYCL/librt-backend-ze.so
            - lib/hipSYCL/librt-backend-ocl.so
            - lib/hipSYCL/librt-backend-omp.so
            - lib/hipSYCL/bitcode/libkernel-sscp-spirv-core.bc
            - lib/hipSYCL/llvm-to-backend/libllvm-to-backend.so
            - etc/AdaptiveCpp/acpp-core.json

  # ── Output 2: compiler binaries + headers + CMake configs ─────────────
  # No activation scripts — those live in acpp-toolchain_linux-64
  - package:
      name: acpp-toolchain
      version: ${{ pkg_version }}
    build:
      script: build.sh
      number: 0
      files:
        include:
          # All binaries (clang, acpp, lld, llvm-*, syclcc, etc.)
          - bin/**
          # All headers (LLVM, Clang, LLD, AdaptiveCpp SYCL, OpenCL, CL/)
          - include/**
          # CMake integration files for all projects
          - lib/cmake/**
          # Clang built-in headers (omp.h, sanitizer headers, etc.)
          - lib/clang/**
          # All static libraries (LLVM, Clang, LLD, liblld*.a, libacpp-*.a)
          - lib/**/*.a
          # Python scan-build helpers (clang static analyzer tooling)
          - lib/libear/**
          - lib/libscanbuild/**
          # Clang format scripts, scan-build/scan-view UI, opt-viewer
          - share/clang/**
          - share/opt-viewer/**
          - share/scan-build/**
          - share/scan-view/**
          - share/man/**
          # OpenCL headers CMake configs (installed by opencl-headers as part of LLVM build)
          - share/cmake/**
          - share/pkgconfig/**
          # libexec scan-build interceptors
          - libexec/**
        exclude:
          # clang-tools binaries live in acpp-clang-tools
          - bin/amdgpu-arch
          - bin/clang-apply-replacements
          - bin/clang-apply-replacements-${{ llvm_major }}
          - bin/clang-change-namespace
          - bin/clang-change-namespace-${{ llvm_major }}
          - bin/clang-check
          - bin/clang-check-${{ llvm_major }}
          - bin/clang-doc
          - bin/clang-doc-${{ llvm_major }}
          - bin/clang-extdef-mapping
          - bin/clang-extdef-mapping-${{ llvm_major }}
          - bin/clang-format
          - bin/clang-format-${{ llvm_major }}
          - bin/clang-include-cleaner
          - bin/clang-include-cleaner-${{ llvm_major }}
          - bin/clang-include-fixer
          - bin/clang-include-fixer-${{ llvm_major }}
          - bin/clang-installapi
          - bin/clang-installapi-${{ llvm_major }}
          - bin/clang-linker-wrapper
          - bin/clang-linker-wrapper-${{ llvm_major }}
          - bin/clang-move
          - bin/clang-move-${{ llvm_major }}
          - bin/clang-nvlink-wrapper
          - bin/clang-nvlink-wrapper-${{ llvm_major }}
          - bin/clang-offload-bundler
          - bin/clang-offload-bundler-${{ llvm_major }}
          - bin/clang-offload-packager
          - bin/clang-offload-packager-${{ llvm_major }}
          - bin/clang-query
          - bin/clang-query-${{ llvm_major }}
          - bin/clang-refactor
          - bin/clang-refactor-${{ llvm_major }}
          - bin/clang-reorder-fields
          - bin/clang-reorder-fields-${{ llvm_major }}
          - bin/clang-repl
          - bin/clang-repl-${{ llvm_major }}
          - bin/clang-scan-deps
          - bin/clang-scan-deps-${{ llvm_major }}
          - bin/clang-sycl-linker
          - bin/clang-sycl-linker-${{ llvm_major }}
          - bin/clang-tidy
          - bin/clang-tidy-${{ llvm_major }}
          - bin/clangd
          - bin/diagtool
          - bin/find-all-symbols
          - bin/git-clang-format
          - bin/hmaptool
          - bin/modularize
          - bin/nvptx-arch
          - bin/offload-arch
          - bin/pp-trace
          - bin/run-clang-tidy
          - bin/scan-build
          - bin/scan-build-py
          - bin/scan-view
    requirements:
      run:
        - ${{ pin_subpackage('acpp-libs', exact=True) }}
        - python >=3.8
        - libgcc-devel_linux-64 >=13
        - libstdcxx-devel_linux-64 >=13
      ignore_run_exports:
        by_name:
          - level-zero-devel
      run_exports:
        strong:
          - ${{ pin_subpackage('acpp-libs', upper_bound='x.x') }}
    tests:
      - package_contents:
          bin:
            - clang # matches bin/clang (symlink to clang-20)
            - acpp # AdaptiveCpp SYCL compiler driver
            - acpp-info # runtime/target info tool
            - lld # linker
            - llvm-ar
            - llvm-config
          include:
            - AdaptiveCpp/sycl/sycl.hpp # main SYCL header
            - clang/Basic/Version.h
          files:
            - lib/cmake/AdaptiveCpp/adaptivecpp-config-version.cmake
            - lib/cmake/llvm/LLVMConfig.cmake
            - lib/cmake/clang/ClangConfig.cmake
            - lib/clang/20/include/omp.h
            - lib/**/*.a

  # ── Output 3: clang tools (format, tidy, clangd, etc.) ───────────────
  # Drop-in replacement for conda-forge's clang-tools package.
  # Built against our bundled LLVM so tool behavior matches the compiler.
  # Installing this blocks conda-forge clang-tools since binaries conflict.
  - package:
      name: acpp-clang-tools
      version: ${{ pkg_version }}
    build:
      script: build.sh
      number: 0
      files:
        include:
          - bin/amdgpu-arch
          - bin/clang-apply-replacements
          - bin/clang-apply-replacements-${{ llvm_major }}
          - bin/clang-change-namespace
          - bin/clang-change-namespace-${{ llvm_major }}
          - bin/clang-check
          - bin/clang-check-${{ llvm_major }}
          - bin/clang-doc
          - bin/clang-doc-${{ llvm_major }}
          - bin/clang-extdef-mapping
          - bin/clang-extdef-mapping-${{ llvm_major }}
          - bin/clang-format
          - bin/clang-format-${{ llvm_major }}
          - bin/clang-include-cleaner
          - bin/clang-include-cleaner-${{ llvm_major }}
          - bin/clang-include-fixer
          - bin/clang-include-fixer-${{ llvm_major }}
          - bin/clang-installapi
          - bin/clang-installapi-${{ llvm_major }}
          - bin/clang-linker-wrapper
          - bin/clang-linker-wrapper-${{ llvm_major }}
          - bin/clang-move
          - bin/clang-move-${{ llvm_major }}
          - bin/clang-nvlink-wrapper
          - bin/clang-nvlink-wrapper-${{ llvm_major }}
          - bin/clang-offload-bundler
          - bin/clang-offload-bundler-${{ llvm_major }}
          - bin/clang-offload-packager
          - bin/clang-offload-packager-${{ llvm_major }}
          - bin/clang-query
          - bin/clang-query-${{ llvm_major }}
          - bin/clang-refactor
          - bin/clang-refactor-${{ llvm_major }}
          - bin/clang-reorder-fields
          - bin/clang-reorder-fields-${{ llvm_major }}
          - bin/clang-repl
          - bin/clang-repl-${{ llvm_major }}
          - bin/clang-scan-deps
          - bin/clang-scan-deps-${{ llvm_major }}
          - bin/clang-sycl-linker
          - bin/clang-sycl-linker-${{ llvm_major }}
          - bin/clang-tidy
          - bin/clang-tidy-${{ llvm_major }}
          - bin/clangd
          - bin/diagtool
          - bin/find-all-symbols
          - bin/git-clang-format
          - bin/hmaptool
          - bin/modularize
          - bin/nvptx-arch
          - bin/offload-arch
          - bin/pp-trace
          - bin/run-clang-tidy
          - bin/scan-build
          - bin/scan-build-py
          - bin/scan-view
          # scan-build/scan-view support files
          - share/clang/**
          - share/scan-build/**
          - share/scan-view/**
          - libexec/**
    requirements:
      run:
        - ${{ pin_subpackage('acpp-libs', exact=True) }}
        - python >=3.8
      ignore_run_exports:
        by_name:
          - level-zero-devel
      run_constraints:
        # Block conda-forge clang-tools packages — binary conflicts on
        # bin/clang-format, bin/clang-tidy, bin/clangd, etc.
        - clang-tools ==9999999999
        - clang-format ==9999999999
        - clang-tidy ==9999999999
        - clangd ==9999999999
    tests:
      - package_contents:
          bin:
            - clang-format
            - clang-tidy
            - clangd
            - clang-apply-replacements
            - clang-query
            - clang-repl
            - run-clang-tidy
            - scan-build

about:
  homepage: https://github.com/AdaptiveCpp/AdaptiveCpp
  license: Apache-2.0 WITH LLVM-exception
  license_file:
    - llvm-project/LICENSE.TXT
    - AdaptiveCpp/LICENSE
  summary: AdaptiveCpp SYCL compiler toolchain (LLVM ${{ llvm_major }} + acpp, linked-into-LLVM build)
  description: |
    Self-contained SYCL compiler supporting CUDA, OpenMP CPU, and Intel GPU
    (Level Zero / OpenCL) via the generic SSCP JIT compilation flow.
    Built from LLVM source with AdaptiveCpp linked directly into clang.
    Install acpp-toolchain_linux-64 alongside this package for
    sysroot-aware activation suitable for building redistributable packages.
  repository: https://github.com/AdaptiveCpp/AdaptiveCpp
